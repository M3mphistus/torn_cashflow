# Torn Cashflow — "Speakeasy Ledger" mafia-noir theme
# Base color tokens. Deep styling (borders, deco accents) lives in
# speakeasy.css, injected by theme.inject_theme() at the top of each page.
# Fonts are declared natively here (not via a script-injected <link>/@import)
# so they load once as part of Streamlit's own theme bootstrap instead of
# being re-injected on every page navigation — that's what caused the
# visible font flash when switching pages.

[server]
enableStaticServing = true

[[theme.fontFaces]]
family = "Archivo"
url = "app/static/fonts/Archivo-Variable.woff2"
weight = "400 700"
style = "normal"

[[theme.fontFaces]]
family = "Cinzel"
url = "app/static/fonts/Cinzel-Variable.woff2"
weight = "500 700"
style = "normal"

[[theme.fontFaces]]
family = "Oswald"
url = "app/static/fonts/Oswald-Variable.woff2"
weight = "300 700"
style = "normal"

[theme]
base = "dark"
primaryColor = "#c9a227"            # brass gold — buttons, accents, active states
backgroundColor = "#14100b"         # warm near-black app canvas
secondaryBackgroundColor = "#1d1710" # panels, cards, sidebar
textColor = "#e8dfc9"               # champagne body text
font = "Archivo"
